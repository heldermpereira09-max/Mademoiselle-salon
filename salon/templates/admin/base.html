<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Administração{% endblock %} — Mademoiselle</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f7f4f7; color: #29232b; }
    .admin-header { display: flex; gap: 1rem; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: #fff; border-bottom: 1px solid #e5dfe6; }
    .admin-brand { margin: 0; font-size: 1.1rem; }
    .admin-nav { display: flex; gap: 1rem; align-items: center; margin-left: auto; }
    .admin-nav a { color: #5d405d; text-decoration: none; font-weight: 600; }
    .admin-main { width: min(100% - 2rem, 1100px); margin: 2rem auto; }
    .admin-card { max-width: 460px; margin: 4rem auto; padding: 2rem; background: #fff; border: 1px solid #e5dfe6; border-radius: 12px; box-shadow: 0 8px 30px rgba(47, 35, 49, .08); }
    .admin-field { margin-bottom: 1rem; }
    .admin-password-field { position: relative; }
    .admin-password-field input { padding-right: 3rem; }
    .admin-password-toggle { position: absolute; right: .35rem; top: 50%; width: 2.3rem; padding: .4rem; transform: translateY(-50%); background: transparent; color: #5d405d; font-size: 1.05rem; }
    label { display: block; margin-bottom: .4rem; font-weight: 600; }
    input { width: 100%; padding: .75rem; border: 1px solid #cfc4d1; border-radius: 7px; font: inherit; }
    button { padding: .7rem 1rem; border: 0; border-radius: 7px; background: #765276; color: #fff; cursor: pointer; font: inherit; }
    button:disabled { cursor: not-allowed; opacity: .5; }
    .admin-alert { margin-bottom: 1rem; padding: .75rem; border-radius: 7px; background: #f8d7da; color: #842029; }
    .admin-logout { margin: 0; }
    .admin-toolbar { display: flex; flex-wrap: wrap; gap: .75rem; align-items: end; margin-bottom: 1.5rem; padding: 1rem; background: #fff; border: 1px solid #e5dfe6; border-radius: 10px; }
    .admin-search { flex: 1 1 260px; }
    .admin-filters { display: flex; flex-wrap: wrap; gap: .4rem; }
    .admin-filter, .admin-link, .admin-action { display: inline-block; padding: .6rem .8rem; border-radius: 7px; text-decoration: none; }
    .admin-filter, .admin-link { color: #5d405d; border: 1px solid #cfc4d1; background: #fff; }
    .admin-filter.active, .admin-link.primary { color: #fff; border-color: #765276; background: #765276; }
    .admin-table-wrap { overflow-x: auto; background: #fff; border: 1px solid #e5dfe6; border-radius: 10px; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th, .admin-table td { padding: .8rem; border-bottom: 1px solid #eee8ef; text-align: left; white-space: nowrap; }
    .admin-table th { background: #f3eef4; }
    .admin-actions { display: flex; gap: .35rem; }
    .admin-action { border: 0; background: #eee7ef; color: #4d374d; font-size: .85rem; }
    .admin-empty { padding: 2rem; text-align: center; color: #756c77; }
    .admin-pagination { display: flex; justify-content: center; gap: .35rem; margin-top: 1.25rem; }
    .admin-stat { display: inline-block; min-width: 180px; padding: 1.25rem; margin-bottom: 1.5rem; background: #fff; border: 1px solid #e5dfe6; border-radius: 10px; }
    .admin-stat strong { display: block; font-size: 2rem; color: #765276; }
    .admin-detail { padding: 1.5rem; background: #fff; border: 1px solid #e5dfe6; border-radius: 10px; }
    .admin-detail dt { margin-top: .8rem; font-weight: 700; }
    .admin-detail dd { margin: .2rem 0 0; }
    .admin-form { max-width: 760px; padding: 1.5rem; background: #fff; border: 1px solid #e5dfe6; border-radius: 10px; }
    .admin-form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    .admin-form .admin-field-full { grid-column: 1 / -1; }
    .admin-form select, .admin-form textarea { width: 100%; padding: .75rem; border: 1px solid #cfc4d1; border-radius: 7px; background: #fff; font: inherit; }
    .admin-readonly { padding: .75rem; border-radius: 7px; background: #f3eef4; }
    .admin-form-actions { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 1.25rem; }
    .admin-sync-note { padding: .8rem; border-left: 4px solid #765276; background: #f3eef4; }
    .admin-errors { margin: 0 0 1rem; padding: 1rem 1rem 1rem 2rem; border-radius: 7px; background: #f8d7da; color: #842029; }
    @media (max-width: 700px) {
      .admin-header { align-items: flex-start; padding: 1rem; }
      .admin-nav { flex-wrap: wrap; justify-content: flex-end; }
      .admin-table th, .admin-table td { padding: .65rem; }
      .admin-form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  {% block header %}{% endblock %}
  <main class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="admin-alert admin-alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
